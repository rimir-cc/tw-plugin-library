        "type": "application/json",
        "readme": "! Appify\n\nTransform TiddlyWiki into an app platform. Define full-viewport applications with named layouts, statewrap-powered state channels, and a floating launcher to switch between apps and the default wiki.\n\n!! Features\n\n* ''App layouts'' — predefined grid templates (sidebar+main, topbar+sidebar+main, triple-column, dashboard, focus) with named view slots\n* ''Statewrap integration'' — each app defines its own state channels and reactive rules\n* ''View binding'' — each slot transcludes a tiddler that reads/writes channels by name\n* ''Floating app switcher'' — always-visible FAB button to launch apps or return to the default wiki\n* ''Edit mode modals'' — channel editor (add/rename/delete channels, set defaults), rule editor (add/delete reactive rules), debug inspector (live state, layout switcher)\n* ''Layout switching'' — switch layouts from the debug inspector; configs (view bindings, splits, proportions) are saved per layout and restored when switching back\n* ''Extensible'' — register apps by tagging tiddlers with `$:/tags/rimir/appify/app`\n\n!! Quick start\n\n# Install the plugin (requires statewrap)\n# Create an app tiddler tagged `$:/tags/rimir/appify/app` with layout and channel fields\n# Create view tiddlers for each layout slot\n# Click the floating button (bottom-right) to launch your app\n\n!! App tiddler fields\n\n|!Field |!Description |\n|`appify-layout` |Layout template name (e.g., `topbar-sidebar-main`) |\n|`appify-channels` |Space-separated channel names for statewrap |\n|`appify-default-<name>` |Default value for channel `<name>` |\n|`appify-view-<slot>` |Tiddler title to transclude into layout slot `<slot>` |\n|`caption` |Display name in the app switcher |\n\nThe tiddler's text body contains `<$statewrap-rule>` definitions for reactive rules.\n\n!! Edit mode (Ctrl+M)\n\nIn edit mode, the debug bar shows live channel values and three buttons:\n\n* ''⚙ Channel editor'' — add, rename, delete channels and set default values\n* ''⇄ Rule editor'' — view and edit reactive rules (when channel X changes → set channel Y)\n* ''🔍 Debug inspector'' — app info, live state tiddler paths, layout switcher\n\n!! Built-in layouts\n\n|!Name |!Slots |!Description |\n|`sidebar-main` |sidebar, main |Left sidebar + main content |\n|`topbar-sidebar-main` |topbar, sidebar, main |Top bar + left sidebar + main content |\n|`triple-column` |left, center, right |Three equal columns |\n|`dashboard` |topbar, left, right |Top bar + two equal panels |\n|`focus` |main |Single full-viewport pane |\n\nLayout configs (view bindings, splits, proportions) are saved per layout and automatically restored when switching back.\n\n!! Prerequisites\n\n* TiddlyWiki 5.3.0 or later\n* statewrap plugin\n",

        "readme": "! explide\n\nInteractive testcase composition IDE for TiddlyWiki. Create config tiddlers that assemble plugins, shadow tiddlers, and ad-hoc content into isolated `$testcase` sandboxes — all from within the wiki.\n\n!! Key features\n\n* ''Config-driven'' — each config tiddler (`rri.type: explide/config`) defines a complete testcase sandbox\n* ''Plugin import'' — import entire plugins or individual shadow tiddlers, with bulk import from filter\n* ''Explide data'' — override imported shadow tiddlers with editable copies using `$rri$:` field remapping\n* ''Field editor'' — add, edit, and delete `$rri$:` remapped fields via the FIELDS tab\n* ''Ad-hoc tiddlers'' — create text-only tiddlers inline without separate files\n* ''Snapshot & diff'' — take snapshots of explide data, compare changes, and restore previous states\n* ''Diagnostics'' — detect missing plugins, unused imports, and stale snapshots\n* ''Layout toggle'' — switch between stacked and side-by-side view\n* ''Output tiddler'' — configurable which tiddler the testcase Output tab displays (defaults to `Output`)\n* ''ViewTemplate integration'' — config tiddlers automatically render the IDE when viewed\n\n!! Prerequisites\n\n* [[$:/plugins/rimir/theme]] — CSS utility classes (`rr-*`)\n* [[$:/plugins/rimir/components]] — tabs and UI components\n* [[$:/plugins/kookma/shiraz]] — slider macro and UI utilities\n\n!! Quick start\n\n# Create a new tiddler\n# Set the field `rri.type` to `explide/config`\n# Save — the IDE appears automatically in the tiddler view\n# Use the CONFIG tab to import plugins and select shadow tiddlers\n# Create an ad-hoc tiddler named `Output` in the ADHOC tab — this is what the testcase renders\n# Click on explide data tabs to edit overridden tiddlers in EDITOR, manage fields in FIELDS, or compare in DIFF\n\n!! Bundled examples\n\n* `$:/plugins/rimir/explide/examples/callout-sandbox` — theme callout types\n* `$:/plugins/rimir/explide/examples/mini-app` — counter app with state management\n* `$:/plugins/rimir/explide/examples/component-lab` — pills facade components\n",

        "readme": "! file upload\n\nUpload media files to the server's `/files/` directory with automatic tiddler creation, rename, delete, thumbnail generation, and content-hash deduplication.\n\n!! Key features\n\n* ''Drag-and-drop upload'' — `<$file-dropzone>` widget uploads to `/files/` and creates tiddlers with `_canonical_uri`\n* ''Thumbnail generation'' — automatic thumbnails for images and PDFs via ImageMagick (configurable resolution)\n* ''Thumbnail rendering'' — show thumbnails by default with click-to-expand and toolbar toggle\n* ''File rename'' — renaming a tiddler renames the physical file including `_generated/` thumbnails\n* ''File delete'' — deleting a tiddler offers to delete the file including thumbnails\n* ''Deduplication'' — optional global content-hash dedup skips identical uploads\n\n!! Prerequisites\n\n* ImageMagick — required for thumbnail generation (`magick` on PATH)\n* Ghostscript — additionally required for PDF thumbnails (`gswin64c` on Windows, `gs` on Linux)\n\n!! Quick start\n\nDrop files onto any `<$file-dropzone>` widget. Configure thumbnail settings and allowed media types in ControlPanel > Settings > file upload.\n\n```\n<$file-dropzone actions=\"\"\"\n<$action-createtiddler $basetitle=<<filename>>\n  _canonical_uri=<<canonical-uri>>\n  _thumbnail_uri=<<generated-uri>>\n  type=<<type>>/>\n\"\"\">\nDrop files here\n</$file-dropzone>\n```\n",

        "readme": "! filesystem watcher\n\nWatches the tiddlers directory for external filesystem changes (created, modified, deleted by tools like Claude Code) and syncs them into the running wiki in real time.\n\n!! Key features\n\n* ''Live file sync'' — detects file changes via chokidar and updates the wiki store automatically\n* ''Reload alerts'' — yellow alert + red refresh icon for changes requiring a browser reload (module tiddlers, system tiddlers)\n* ''Loop prevention'' — hooks TW's save/delete functions to ignore its own filesystem writes\n* ''CLI mode skip'' — exits immediately when `TIDDLYWIKI_CLI_MODE=1` so CLI imports don't hang\n* ''Ignored tiddlers'' — skips noisy tiddlers like `$:/StoryList` that change frequently and have no value for external sync\n* ''Configurable poll interval'' — set sync frequency in settings\n\n!! Prerequisites\n\n* chokidar (npm dependency, installed with the wiki)\n\n!! Quick start\n\nInstall plugin. Configure the poll interval in ControlPanel > Settings > filesystem watcher. External file changes in the tiddlers directory sync automatically into the running wiki.\n",

        "readme": "! git integration\n\nGit version control for individual tiddlers from within the TiddlyWiki editor. Commit, diff, restore, and stash changes without leaving edit mode.\n\n!! Key features\n\n* ''Inline diff'' — view current changes vs. last commit side by side\n* ''Commit'' — commit individual tiddlers with a commit message\n* ''Stash'' — stash/unstash and inspect stashed changes\n* ''Restore'' — restore tiddler content to any previous version\n* ''Draft-aware'' — works with unsaved edits (browser sends draft fields to server)\n* ''Multi-repo'' — automatically detects which git repo each tiddler belongs to (supports nested repos)\n* ''Toolbar button'' — accessible from the edit toolbar\n\n!! Prerequisites\n\n* Git installed and available on the server's PATH\n* Tiddlers directory (or subdirectories) must be inside a git repository\n\n!! Quick start\n\nInitialize git in your tiddlers directory (or use separate repos for subdirectories like `tiddlers/work/` and `tiddlers/private/`). Open any tiddler in edit mode and click the git icon in the toolbar to access diff, commit, and stash operations.\n",

        "readme": "! json dsl\n\nDeclarative JSON builder widgets for TiddlyWiki. Compose JSON structures using widget syntax instead of string manipulation.\n\n!! Key features\n\n* ''Composable widget set'' — `<$json-obj>`, `<$json-array>`, `<$json-prop>`, `<$json-val>`, `<$json-item>`\n* ''Output widgets'' — emit to tiddler field (`<$json-save>`) or action variable (`<$json-emit>`)\n* ''Debug widget'' — `<$json-debug>` for inspecting output during development\n* ''Widget tree integration'' — seamless integration with TiddlyWiki's widget tree and filter expressions\n\n!! Prerequisites\n\nNo external prerequisites.\n\n!! Quick start\n\nBuild JSON declaratively: `<$json-obj><$json-prop name=\"key\"><$json-val value=\"hello\"/></$json-prop></$json-obj>`. Use `<$json-emit>` to output the result.\n",

    {
        "title": "$:/plugins/rimir/llm-connect",
        "description": "In-browser LLM integration with tool use — connect TiddlyWiki to Claude, OpenAI, Azure, and other LLM APIs",
        "author": "rimir",
        "version": "0.1.16",
        "core-version": ">=5.3.0",
        "source": "https://github.com/rimir-cc/tw-llm-connect",
        "name": "llm connect",
        "plugin-type": "plugin",
        "list": "readme documentation settings changelog license",
        "dependents": "$:/plugins/rimir/theme",
        "type": "application/json",
        "readme": "! llm connect\n\nIn-browser LLM integration with tool use. Connect TiddlyWiki to Claude, OpenAI, Azure, and other LLM APIs — the wiki acts as the orchestrator: sends prompts, receives tool calls, executes them against `$tw.wiki`, and returns results. No server required.\n\n!! Key features\n\n* ''Two modes'' — interactive chat (multi-turn, tool use) and one-shot actions (context template → LLM → output target)\n* ''Pair editing'' — toolbar button opens an embedded chat panel on any tiddler for collaborative editing with the LLM\n* ''Provider adapters'' — Claude, OpenAI, and Azure OpenAI out of the box, extensible for other providers\n* ''Dynamic model selection'' — fetch available models from provider APIs; per-chat model selector with provider locking\n* ''Tool system'' — built-in tools for searching, reading, navigating, and modifying tiddlers; user-defined tools via wikitext\n* ''Per-chat tool selection'' — wrench icon opens a dropdown to toggle individual tools per chat; tool groups as quick presets\n* ''Multimodal context'' — attach PDFs, images, and text tiddlers to conversations via a context filter; binary files are fetched, base64-encoded, and sent inline to the LLM\n* ''Context templates'' — wikitext templates that render input for the LLM from one or more source tiddlers\n* ''Output targets'' — write LLM responses to fields, new tiddlers, or just display in chat\n* ''Debug panel'' — toggle a live preview of the request payload or inspect the last sent request; base64 data abbreviated for readability\n* ''Resizable chat'' — drag the chat panel edges or the chat history resize handle to adjust layout\n* ''Tiddler protection'' — restricted wiki proxy makes protected tiddlers invisible to all tool wikitext; default filter protects `[tag[sensitive]]` and all rimir plugin internals (`$:/plugins/rimir/`); configurable in settings with reset-to-default + per-chat filter via shield icon\n* ''Audit logging'' — write operations (set-field, create, delete) execute immediately with an audit log\n\n!! Prerequisites\n\n* An API key for at least one supported provider (Claude, OpenAI, or Azure OpenAI)\n* A modern browser (async/await support)\n\n!! Quick start\n\n# Install the plugin and configure your API key in Settings\n# Open the chat from the page toolbar button\n# Ask a question — the LLM can search and read your wiki via tools\n# Click the pair-edit button in any tiddler's toolbar to start a collaborative editing session\n\nFor one-shot actions, add a button to any tiddler:\n\n```\n<$button>\n  Summarize\n  <$llm-action\n    tiddler=<<currentTiddler>>\n    prompt=\"Summarize the most important points in 3 bullets.\"\n  />\n</$button>\n```\n",
        "requires-reload": "yes",
        "icon": "data:image/svg+xml,%3Csvg%20width%3D%2222pt%22%20height%3D%2222pt%22%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22maroon%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%0A%3Cpath%20d%3D%22M21%2015a2%202%200%200%201-2%202H7l-4%204V5a2%202%200%200%201%202-2h14a2%202%200%200%201%202%202z%22%2F%3E%0A%3Ccircle%20cx%3D%229%22%20cy%3D%2210%22%20r%3D%221%22%20fill%3D%22maroon%22%20stroke%3D%22none%22%2F%3E%0A%3Ccircle%20cx%3D%2212%22%20cy%3D%2210%22%20r%3D%221%22%20fill%3D%22maroon%22%20stroke%3D%22none%22%2F%3E%0A%3Ccircle%20cx%3D%2215%22%20cy%3D%2210%22%20r%3D%221%22%20fill%3D%22maroon%22%20stroke%3D%22none%22%2F%3E%0A%3C%2Fsvg%3E%0A"

    {
        "title": "$:/plugins/rimir/minver",
        "description": "Browser-side tiddler versioning with snapshots",
        "name": "minver",
        "author": "rimir",
        "version": "0.1.5",
        "core-version": ">=5.3.0",
        "source": "https://github.com/rimir-cc/tw-minver",

        "dependents": "$:/plugins/rimir/theme",
        "type": "application/json",
        "readme": "! minver — browser-side tiddler versioning\n\nKeep snapshot versions of your tiddlers directly in the browser. Snapshots are stored compressed in localStorage and survive page reloads.\n\n!! Key features\n\n* ''Manual snapshots'' — take a snapshot anytime from the editor preview pane\n* ''Auto-snapshots'' — automatically captures the previous version on every save\n* ''Diff view'' — per-field comparison with `<$diff-text>`, integrated as an editor preview type\n* ''Field-level rollback'' — revert individual fields or the entire tiddler\n* ''Compressed storage'' — uses native CompressionStream to minimize localStorage usage\n* ''Export/Import'' — transfer snapshots between wikis via a single JSON tiddler\n\n!! Quick start\n\n# Open any tiddler for editing\n# Click the eye icon in the editor toolbar and select \"snapshots\"\n# Click \"Take snapshot\" to create a manual snapshot\n# Edit the tiddler, then select your snapshot to see the diff\n# Use the undo button next to any field to revert it\n\n!! Prerequisites\n\n* TiddlyWiki 5.3.0+\n* Theme plugin (`$:/plugins/rimir/theme`)\n* A modern browser with CompressionStream support (Chrome 80+, Firefox 113+, Safari 16.4+)\n",
        "requires-reload": "yes",

    {

        "name": "orga",

        "type": "application/json",
        "readme": "! orga\n\nOrganisational domain model built on the typed plugin. Provides type definitions for common organisational entities like projects, tasks, teams, persons, milestones, and roadmaps.\n\n!! Key features\n\n* ''Pre-built type definitions'' — project, task, team, person, workstream, assignment, roadmap, milestone, 1on1\n* ''Hierarchical node structure'' — parent relationships between organisational entities\n* ''Field definitions'' — common attributes like status, dates, stakeholders, participants\n* ''Enum definitions'' — predefined value sets (e.g., core-status)\n* ''Extensible'' — builds on the typed plugin's inheritance model\n\n!! Prerequisites\n\n* typed plugin must be installed\n\n!! Quick start\n\nInstall plugin alongside typed. Use the Spawner to create new organisational entities. All types are immediately available in the type system.\n",

    {
        "title": "$:/plugins/rimir/realms",
        "description": "Toggle visibility of tiddler groups (realms) via TiddlyWiki filters",
        "name": "realms",
        "author": "rimir",
        "version": "0.1.4",

        "source": "https://github.com/rimir-cc/tw-realms",
        "plugin-type": "plugin",
        "list": "readme documentation settings changelog license",
        "dependents": "$:/plugins/rimir/theme",
        "type": "application/json",
        "readme": "! realms\n\nToggle visibility of tiddler groups from the browser using TiddlyWiki filter expressions. Uses a subtract model — all tiddlers are visible by default, ticking a realm hides its matching tiddlers.\n\n!! Key features\n\n* ''Filter-based realms'' — each realm defines a TiddlyWiki filter in `realms.json`\n* ''Subtract model'' — all visible by default, tick to hide matching tiddlers\n* ''Per-request filtering'' — server keeps all tiddlers in memory, filtering at the HTTP layer\n* ''Settings UI'' — toggle realms on/off in ControlPanel with visual feedback\n* ''No restart needed'' — `realms.json` is re-read per request\n\n!! Prerequisites\n\nNo external prerequisites.\n\n!! Quick start\n\nDefine realms in `realms.json` (next to `tiddlywiki.info`):\n\n```\n{ \"work\": { \"filter\": \"[tag[Work]]\", \"description\": \"Work tiddlers\", \"active\": false } }\n```\n\nToggle visibility in ControlPanel > Settings > realms.\n",
        "requires-reload": "yes",
        "icon": "data:image/svg+xml,%3Csvg%20width%3D%2222pt%22%20height%3D%2222pt%22%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22maroon%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%0A%3Cpolygon%20points%3D%2212%202%2022%208.5%2012%2015%202%208.5%22%2F%3E%0A%3Cpolyline%20points%3D%222%2012%2012%2018.5%2022%2012%22%2F%3E%0A%3Cpolyline%20points%3D%222%2015.5%2012%2022%2022%2015.5%22%2F%3E%0A%3C%2Fsvg%3E"

    {
        "title": "$:/plugins/rimir/runner",
        "description": "Execute whitelisted commands on the host machine via HTTP route",
        "author": "rimir",

        "source": "https://github.com/rimir-cc/tw-runner",

        "type": "application/json",
        "readme": "! runner\n\nExecute whitelisted commands on the host machine via an HTTP route and trigger them from the browser with an action widget.\n\n!! Key features\n\n* ''Whitelist security'' — only commands defined in `runner-actions.json` can be executed\n* ''Parameterized commands'' — `{{placeholder}}` templates substituted from query params\n* ''Action widget'' — `<$api.run action=\"name\" param=\"value\"/>` for use inside `<$button>`\n* ''HTTP route'' — `GET /api/run?action=<name>` for direct invocation\n\n!! Prerequisites\n\n* Commands must be configured in `runner-actions.json` (next to `tiddlywiki.info`)\n\n!! Quick start\n\nAdd an action entry to `runner-actions.json`:\n\n```\n{ \"myaction\": { \"command\": \"echo hello\", \"description\": \"Test\" } }\n```\n\nUse in any tiddler:\n\n```\n<$button><$api.run action=\"myaction\"/>Run</$button>\n```\n",

    {
        "title": "$:/plugins/rimir/statewrap",
        "description": "Channel-based state management with reactive rules for decoupled, reusable views",
        "name": "statewrap",
        "author": "rimir",
        "version": "0.1.0",
        "core-version": ">=5.3.0",
        "source": "https://github.com/rimir-cc/statewrap",
        "plugin-type": "plugin",
        "list": "readme documentation settings showcase changelog license",
        "dependents": "",
        "type": "application/json",
        "readme": "! Statewrap\n\nChannel-based state management for TiddlyWiki. Define named state channels in a container, and let child views read/write them by name — without knowing the underlying state tiddler paths.\n\n!! Features\n\n* ''Named channels'' — views reference logical names like `selected-project`, not `$:/state/...` paths\n* ''Reactive rules'' — declarative wikitext actions fire when a channel changes (e.g., \"when project changes, clear task selection\")\n* ''Instance isolation'' — each `<$statewrap>` gets its own state namespace via `instid` or TW's qualify mechanism\n* ''Re-entry guard'' — rules cannot cascade (a rule's actions won't trigger further rules)\n* ''Filter operators'' — `[statewrap-get[channel]]` reads value, `[statewrap-ref[channel]]` returns state tiddler path\n\n!! Quick start\n\n```\n<$statewrap channels=\"selected-project selected-task detail-tab\"\n            default-detail-tab=\"overview\" instid=\"demo\">\n  <$statewrap-rule when=\"selected-project\">\n    <$action-statewrap-set channel=\"selected-task\" value=\"\"/>\n    <$action-statewrap-set channel=\"detail-tab\" value=\"overview\"/>\n  </$statewrap-rule>\n\n  <%if [statewrap-get[selected-project]!is[blank]]%>\n    Project: <$text text={{{[statewrap-get[selected-project]]}}}/>\n  <%endif%>\n</$statewrap>\n```\n\n!! API\n\n|!Element |!Name |!Purpose |\n|Container widget |`<$statewrap>` |Defines channels, defaults; establishes context |\n|Rule widget |`<$statewrap-rule>` |Declares reactive wikitext actions for a channel change |\n|Action widget |`<$action-statewrap-set>` |Write to a channel by name |\n|Filter operator |`[statewrap-get[channel]]` |Read a channel's current value |\n|Filter operator |`[statewrap-ref[channel]]` |Get a channel's state tiddler path |\n\n!! Prerequisites\n\nTiddlyWiki 5.3.0 or later.\n",
        "requires-reload": "yes",
        "icon": "data:image/svg+xml,%3Csvg%20width%3D%2222pt%22%20height%3D%2222pt%22%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22maroon%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%0A%20%20%3Crect%20x%3D%223%22%20y%3D%223%22%20width%3D%2218%22%20height%3D%2218%22%20rx%3D%223%22%2F%3E%0A%20%20%3Ccircle%20cx%3D%228%22%20cy%3D%228%22%20r%3D%221.5%22%20fill%3D%22maroon%22%2F%3E%0A%20%20%3Ccircle%20cx%3D%2216%22%20cy%3D%228%22%20r%3D%221.5%22%20fill%3D%22maroon%22%2F%3E%0A%20%20%3Ccircle%20cx%3D%228%22%20cy%3D%2216%22%20r%3D%221.5%22%20fill%3D%22maroon%22%2F%3E%0A%20%20%3Ccircle%20cx%3D%2216%22%20cy%3D%2216%22%20r%3D%221.5%22%20fill%3D%22maroon%22%2F%3E%0A%20%20%3Cline%20x1%3D%228%22%20y1%3D%229.5%22%20x2%3D%228%22%20y2%3D%2214.5%22%2F%3E%0A%20%20%3Cline%20x1%3D%2216%22%20y1%3D%229.5%22%20x2%3D%2216%22%20y2%3D%2214.5%22%2F%3E%0A%20%20%3Cline%20x1%3D%229.5%22%20y1%3D%228%22%20x2%3D%2214.5%22%20y2%3D%228%22%2F%3E%0A%20%20%3Cline%20x1%3D%229.5%22%20y1%3D%2216%22%20x2%3D%2214.5%22%20y2%3D%2216%22%2F%3E%0A%3C%2Fsvg%3E%0A"

    {
        "title": "$:/plugins/rimir/theme",
        "description": "Shared visual theme for rimir plugins",
        "name": "theme",
        "author": "rimir",
        "version": "0.1.4",
        "core-version": ">=5.3.0",
        "source": "https://github.com/rimir-cc/tw-theme",
        "plugin-type": "plugin",
        "list": "readme documentation settings changelog license",
        "dependents": "",
        "type": "application/json",
        "readme": "! theme\n\nShared visual CSS classes (prefix `rr-`) used across all rimir plugins. Provides consistent styling for tabs, panels, tables, callouts, notices, badges, forms, status messages, and the settings hub layout.\n\n!! Key features\n\n* ''Tabs'' — `rr-tabs`, `rr-tab`, `rr-tab-active` for horizontal tab bars\n* ''Callouts'' — four types (info, warning, tip, danger) via reusable template\n* ''Notices'' — alert banners (warning, info, danger, success)\n* ''Badges'' — circular and rectangular pill badges\n* ''Settings hub layout'' — sidebar + content panel classes for core-hook\n* ''Utilities'' — muted, mono, nowrap, small helper classes\n\n!! Prerequisites\n\nNo external prerequisites.\n\n!! Quick start\n\nInstall plugin. Use `rr-` prefixed CSS classes in your tiddlers. For callouts:\n\n```\n<$transclude $tiddler=\"$:/plugins/rimir/theme/callout\" type=\"info\">\n<$fill $name=\"body\">Your message</$fill>\n</$transclude>\n```\n\n!! Class reference\n\n!!! Tabs\n\n|!Class |!Purpose |\n|`rr-tabs` |Flex container for tab bar |\n|`rr-tab` |Individual tab button |\n|`rr-tab-active` |Active tab (add alongside `rr-tab`) |\n\n```\n<div class=\"rr-tabs\">\n  <$button class=\"rr-tab rr-tab-active\">Tab 1</$button>\n  <$button class=\"rr-tab\">Tab 2</$button>\n</div>\n```\n\n!!! Panels\n\n|!Class |!Purpose |\n|`rr-panel` |Bordered container with background |\n|`rr-panel-body` |Padded inner content area |\n\n!!! Tables\n\n|!Class |!Purpose |\n|`rr-table` |Full-width collapsed table |\n|`rr-row-error` |Red background row (on `<tr>`) |\n|`rr-row-warn` |Yellow background row (on `<tr>`) |\n\n!!! Callouts\n\nUse the template `$:/plugins/rimir/theme/callout` with parameters `type` (`info`/`warning`/`tip`/`danger`) and optional `label`.\n\n|!Class |!Purpose |\n|`rr-callout` |Base callout box |\n|`rr-callout-info` |Blue left border |\n|`rr-callout-warning` |Amber left border |\n|`rr-callout-tip` |Green left border |\n|`rr-callout-danger` |Red left border |\n|`rr-callout-label` |Bold uppercase label |\n\n!!! Notices\n\nUse the template `$:/plugins/rimir/theme/notice` with parameter `type` (`warning`/`info`/`danger`/`success`).\n\n|!Class |!Purpose |\n|`rr-notice` |Base notice banner |\n|`rr-notice-warning` |Yellow background |\n|`rr-notice-info` |Light blue background |\n|`rr-notice-danger` |Light red background |\n|`rr-notice-success` |Light green background |\n\n!!! Status Messages\n\n|!Class |!Purpose |\n|`rr-status-loading` |Muted italic loading text |\n|`rr-status-error` |Red alert box |\n|`rr-status-success` |Green success box |\n|`rr-status-info` |Muted info text |\n\n!!! Badges\n\n|!Class |!Purpose |\n|`rr-badge-circle` |16px round badge |\n|`rr-badge-added` |Green circle (use with `rr-badge-circle`) |\n|`rr-badge-removed` |Red circle (use with `rr-badge-circle`) |\n|`rr-badge-rect` |Rectangular pill badge |\n\n!!! Forms\n\n|!Class |!Purpose |\n|`rr-input-row` |Flex row with gap |\n|`rr-input` |Styled text input |\n\n!!! Link Buttons\n\n|!Class |!Purpose |\n|`rr-link-btn` |Primary-colored link-style button |\n|`rr-link-btn-danger` |Alert-colored variant (add alongside `rr-link-btn`) |\n\n!!! Settings Hub\n\n|!Class |!Purpose |\n|`rr-settings-hub` |Flex container for sidebar + content layout |\n|`rr-settings-sidebar` |Left sidebar with plugin list |\n|`rr-settings-plugin-item` |Sidebar button for each plugin |\n|`rr-settings-plugin-active` |Active state highlight (accent border) |\n|`rr-settings-plugin-name` |Plugin name text (truncated) |\n|`rr-settings-plugin-version` |Version badge |\n|`rr-settings-content` |Right content area |\n|`rr-settings-header` |Plugin header with icon + name + description |\n|`rr-settings-header-name` |Plugin name in header |\n|`rr-settings-header-desc` |Plugin description in header |\n|`rr-settings-info-card` |Dashed info card for plugins without settings |\n\n!!! Utilities\n\n|!Class |!Purpose |\n|`rr-muted` |Muted foreground color |\n|`rr-mono` |Monospace font |\n|`rr-nowrap` |No text wrapping |\n|`rr-small` |0.85em font size |\n",
        "requires-reload": "no",

/*\
title: $:/plugins/tiddlywiki/pluginlibrary/libraryserver.js
type: application/javascript
module-type: library

A simple HTTP-over-window.postMessage implementation of a standard TiddlyWeb-compatible server. It uses real HTTP to load the individual tiddler JSON files.

\*/

"use strict";

// Listen for window messages
window.addEventListener("message",function listener(event){
	console.log("plugin library: Received message from",event.origin);
	console.log("plugin library: Message content",event.data);
	switch(event.data.verb) {
		case "GET":
			if(event.data.url === "recipes/library/tiddlers.json") {
				// Route for recipes/library/tiddlers.json
				event.source.postMessage({
					verb: "GET-RESPONSE",
					status: "200",
					cookies: event.data.cookies,
					url: event.data.url,
					type: "application/json",
					body: JSON.stringify(assetList,null,4)
				},"*");
			} else if(event.data.url.indexOf("recipes/library/tiddlers/") === 0) {
				var url = "recipes/library/tiddlers/" + encodeURIComponent(removePrefix(event.data.url,"recipes/library/tiddlers/"));
				// Route for recipes/library/tiddlers/<uri-encoded-tiddler-title>.json
				httpGet(url,function(err,responseText) {
					if(err) {
						event.source.postMessage({
							verb: "GET-RESPONSE",
							status: "404",
							cookies: event.data.cookies,
							url: event.data.url,
							type: "text/plain",
							body: "Not found"
						},"*");
					} else {
						event.source.postMessage({
							verb: "GET-RESPONSE",
							status: "200",
							cookies: event.data.cookies,
							url: event.data.url,
							type: "application/json",
							body: responseText
						},"*");
					}
				});
			} else {
				event.source.postMessage({
					verb: "GET-RESPONSE",
					status: "404",
					cookies: event.data.cookies,
					url: event.data.url,
					type: "text/plain",
					body: "Not found"
				},"*");
			}
			break;
	}
},false);

// Helper to remove string prefixes
function removePrefix(string,prefix) {
	if(string.indexOf(prefix) === 0) {
		return string.substr(prefix.length);
	} else {
		return string;
	}
}

// Helper for HTTP GET
function httpGet(url,callback) {
	var http = new XMLHttpRequest();
	http.open("GET",url,true);
	http.onreadystatechange = function() {
		if(http.readyState == 4 && http.status == 200) {
			callback(null,http.responseText);
		}
	};
	http.send();
}

</script>
